name: CI Pipeline - Build & Push Docker Images

on:
  push:
    branches:
      - master # Triggers when code is pushed to master branch
    paths-ignore:
      - 'k8s/**'
      - 'argocd/**'
      - 'README.md'

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone the repository code to GitHub runner
      - name: Checkout Code
        uses: actions/checkout@v4

      # Step 2: Log in to Docker Hub using secrets set in GitHub
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Step 3: Build & Push Backend Docker Image
      - name: Build & Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: uday188/worktrack-backend:latest

      # Step 4: Build & Push Frontend Docker Image
      - name: Build & Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: uday188/worktrack-frontend:latest
