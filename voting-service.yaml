# ============================================================
#  VOTING APP SERVICE
#  NodePort = accessible from browser
#  URL: http://localhost:30004
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: voting-service
spec:
  type: NodePort
  selector:
    app: voting-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30004
