# ============================================================
#  VOTING APP POD
#  Python Flask frontend - where users vote for Cats or Dogs
#  Connects to Redis using service name "redis"
# ============================================================
apiVersion: v1
kind: Pod
metadata:
  name: voting-app-pod
  labels:
    app: voting-app
spec:
  containers:
    - name: voting-app
      image: dockersamples/examplevotingapp_vote:before
      ports:
        - containerPort: 80
