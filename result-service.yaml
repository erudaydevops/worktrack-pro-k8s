# ============================================================
#  RESULT APP SERVICE
#  NodePort = accessible from browser
#  URL: http://localhost:30005
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: result-service
spec:
  type: NodePort
  selector:
    app: result-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30005
