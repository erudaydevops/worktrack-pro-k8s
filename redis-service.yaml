# ============================================================
#  REDIS SERVICE
#  ClusterIP = only accessible inside the cluster (not browser)
#  Name "redis" is used by voting-app and worker to connect
# ============================================================
apiVersion: v1
kind: Service
metadata:
  name: redis
spec:
  type: ClusterIP
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
